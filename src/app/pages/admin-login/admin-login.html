<section class="admin-login-page">

    <h2>Personalinloggning</h2>

    <p class="admin-login-intro">
        Logga in för att hantera meny, bokningar och personal.
    </p>

    <form class="admin-login-form" (ngSubmit)="login()">

        <label for="email">E-post</label>
        <input id="email" name="email" type="email" [(ngModel)]="email">

        <label for="password">Lösenord</label>
        <input id="password" name="password" type="password" [(ngModel)]="password">

        @if (errorMessage()) {
        <p class="admin-login-error" role="alert">
            {{ errorMessage() }}
        </p>
        }

        <button type="submit" [disabled]="isLoading()">
            @if (isLoading()) {
            Loggar in...
            } @else {
            Logga in
            }
        </button>

    </form>

    <a routerLink="/" class="back-to-site">
        ← Till startsidan
    </a>

</section>
